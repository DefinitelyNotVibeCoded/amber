<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d1c18"/>
      <stop offset="100%" stop-color="#141310"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#e3aa4a" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#e3aa4a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amberBody" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8dfa0"/>
      <stop offset="48%" stop-color="#e0a53f"/>
      <stop offset="100%" stop-color="#8a5a1c"/>
    </linearGradient>
    <linearGradient id="amberHighlight" x1="8" y1="3" x2="17" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#3c382f" fill-opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- knowledge-graph texture, framing the corners so the center stays clear for the lockup -->
  <g stroke="#e3aa4a" stroke-opacity="0.2" stroke-width="1.3">
    <line x1="110" y1="90" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="170" y2="240"/>
    <line x1="200" y1="150" x2="300" y2="120"/>
    <line x1="300" y1="120" x2="360" y2="190"/>
    <line x1="170" y1="240" x2="260" y2="280"/>
    <line x1="70" y1="200" x2="170" y2="240"/>
    <line x1="60" y1="380" x2="150" y2="420"/>
    <line x1="150" y1="420" x2="130" y2="510"/>
    <line x1="150" y1="420" x2="250" y2="450"/>
    <line x1="130" y1="510" x2="220" y2="550"/>
    <line x1="1170" y1="100" x2="1090" y2="160"/>
    <line x1="1090" y1="160" x2="1120" y2="250"/>
    <line x1="1090" y1="160" x2="990" y2="130"/>
    <line x1="990" y1="130" x2="930" y2="200"/>
    <line x1="1120" y1="250" x2="1030" y2="290"/>
    <line x1="1200" y1="220" x2="1120" y2="250"/>
    <line x1="1210" y1="390" x2="1130" y2="430"/>
    <line x1="1130" y1="430" x2="1150" y2="520"/>
    <line x1="1130" y1="430" x2="1030" y2="460"/>
    <line x1="1150" y1="520" x2="1060" y2="560"/>
  </g>
  <g fill="#e3aa4a" fill-opacity="0.6">
    <circle cx="110" cy="90" r="4"/>
    <circle cx="200" cy="150" r="5.5"/>
    <circle cx="170" cy="240" r="4"/>
    <circle cx="300" cy="120" r="4"/>
    <circle cx="360" cy="190" r="4.5"/>
    <circle cx="260" cy="280" r="3.5"/>
    <circle cx="70" cy="200" r="3.5"/>
    <circle cx="60" cy="380" r="3.5"/>
    <circle cx="150" cy="420" r="5"/>
    <circle cx="130" cy="510" r="4"/>
    <circle cx="250" cy="450" r="3.5"/>
    <circle cx="220" cy="550" r="3.5"/>
    <circle cx="1170" cy="100" r="4"/>
    <circle cx="1090" cy="160" r="5.5"/>
    <circle cx="1120" cy="250" r="4"/>
    <circle cx="990" cy="130" r="4"/>
    <circle cx="930" cy="200" r="3.5"/>
    <circle cx="1030" cy="290" r="3.5"/>
    <circle cx="1200" cy="220" r="3.5"/>
    <circle cx="1210" cy="390" r="3.5"/>
    <circle cx="1130" cy="430" r="5"/>
    <circle cx="1150" cy="520" r="4"/>
    <circle cx="1030" cy="460" r="3.5"/>
    <circle cx="1060" cy="560" r="3.5"/>
  </g>

  <!-- center lockup: gem + wordmark + tagline -->
  <g transform="translate(538,108) scale(6.4)">
    <polygon points="16,2 27,9 27,23 16,30 5,23 5,9" fill="url(#amberBody)" stroke="#5b3a12" stroke-opacity="0.35" stroke-width="0.75"/>
    <path d="M16 2 L16 30 M5 9 L27 23 M5 23 L27 9" stroke="#5b3a12" stroke-opacity="0.22" stroke-width="0.6" fill="none"/>
    <polygon points="16,2 22,6 16,11.5 9,7" fill="url(#amberHighlight)"/>
    <g stroke="#fff6e3" stroke-opacity="0.9" stroke-width="0.9" fill="#fff6e3">
      <line x1="12" y1="19.5" x2="16" y2="16.5" stroke-opacity="0.75"/>
      <line x1="16" y1="16.5" x2="20.5" y2="20" stroke-opacity="0.75"/>
      <circle cx="12" cy="19.5" r="1.3"/>
      <circle cx="16" cy="16.5" r="1.5"/>
      <circle cx="20.5" cy="20" r="1.3"/>
    </g>
  </g>

  <text x="640" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#ede8db" letter-spacing="-1">Amber</text>
  <text x="640" y="468" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="23" fill="#b3ac9c">A local, Obsidian-style app for Open Knowledge Format bundles,</text>
  <text x="640" y="500" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="23" fill="#b3ac9c">built for notes that both you and AI agents maintain.</text>
</svg>
